<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web to Markdown Converter</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f0f2f5;
        color: #333;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header ─────────────────────────────────────── */
      .header {
        background: #1a1f2e;
        color: white;
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .header-left h1 {
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: -0.3px;
      }

      .header-left p {
        font-size: 0.78rem;
        color: #8892a4;
        margin-top: 1px;
      }

      .header-badge {
        font-size: 0.7rem;
        background: rgba(99, 102, 241, 0.2);
        color: #a5b4fc;
        border: 1px solid rgba(99, 102, 241, 0.4);
        border-radius: 12px;
        padding: 0.2rem 0.6rem;
        font-weight: 500;
      }

      /* ── Main layout ─────────────────────────────────── */
      .main-container {
        display: flex;
        flex: 1;
        overflow: hidden;
        gap: 1px;
        background: #d8dce6;
      }

      .panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: white;
        min-width: 0;
      }

      /* ── Panel header ─────────────────────────────────── */
      .panel-header {
        padding: 0.65rem 1rem;
        border-bottom: 1px solid #e8ecf0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f8fafc;
        flex-shrink: 0;
      }

      .panel-title {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .panel-hint {
        font-size: 0.72rem;
        color: #94a3b8;
        margin-top: 1px;
      }

      .panel-content {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      /* ── WYSIWYG editor ───────────────────────────────── */
      #editor {
        flex: 1;
        padding: 1.25rem 1.5rem;
        overflow-y: auto;
        border: none;
        outline: none;
        cursor: text;
        font-size: 14px;
        line-height: 1.7;
        background: white;
        color: #1e293b;
      }

      #editor:focus {
        outline: none;
      }

      /* Placeholder shown when editor is truly empty */
      #editor:empty::before {
        content: attr(data-placeholder);
        color: #94a3b8;
        font-style: italic;
        pointer-events: none;
      }

      /* Basic rich-text styling inside the editor */
      #editor h1, #editor h2, #editor h3,
      #editor h4, #editor h5, #editor h6 {
        margin: 0.8em 0 0.4em;
        line-height: 1.3;
      }
      #editor p { margin-bottom: 0.6em; }
      #editor ul, #editor ol { padding-left: 1.5rem; margin-bottom: 0.6em; }
      #editor table { border-collapse: collapse; width: 100%; margin-bottom: 0.8em; }
      #editor th, #editor td {
        border: 1px solid #e2e8f0;
        padding: 0.35rem 0.6rem;
        font-size: 0.9em;
      }
      #editor th { background: #f8fafc; font-weight: 600; }
      #editor pre, #editor code {
        font-family: "Monaco", "Menlo", "Consolas", monospace;
        font-size: 0.88em;
      }
      #editor pre {
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        padding: 0.75rem 1rem;
        overflow-x: auto;
        margin-bottom: 0.6em;
      }
      #editor code { background: #f1f5f9; padding: 0.1em 0.35em; border-radius: 3px; }
      #editor blockquote {
        border-left: 3px solid #6366f1;
        padding-left: 0.75rem;
        color: #64748b;
        font-style: italic;
        margin: 0.6em 0;
      }

      /* ── Markdown panel ───────────────────────────────── */
      #markdown-editor {
        flex: 1;
        width: 100%;
        height: 100%;
        min-height: 0;
      }

      /* ── Stats bar ────────────────────────────────────── */
      .stats-bar {
        font-size: 0.72rem;
        color: #94a3b8;
        padding: 0.3rem 0.75rem;
        background: #0d1117;
        border-top: 1px solid #1e2738;
        flex-shrink: 0;
        font-family: "Monaco", "Menlo", "Consolas", monospace;
        letter-spacing: 0.2px;
      }

      /* ── Preview ──────────────────────────────────────── */
      .preview-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
      }

      #markdown-preview {
        flex: 1;
        padding: 1.25rem 1.5rem;
        overflow-y: auto;
        font-size: 14px;
        line-height: 1.7;
        color: #1e293b;
      }

      #markdown-preview h1,
      #markdown-preview h2,
      #markdown-preview h3,
      #markdown-preview h4,
      #markdown-preview h5,
      #markdown-preview h6 {
        margin-top: 1.4rem;
        margin-bottom: 0.5rem;
        color: #0f172a;
        line-height: 1.3;
      }
      #markdown-preview h1 { font-size: 1.75rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.3rem; }
      #markdown-preview h2 { font-size: 1.4rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.25rem; }
      #markdown-preview h3 { font-size: 1.15rem; }

      #markdown-preview p { margin-bottom: 0.9rem; }

      #markdown-preview a {
        color: #6366f1;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      #markdown-preview a:hover { color: #4f46e5; }

      #markdown-preview code {
        background: #f1f5f9;
        padding: 0.15rem 0.4rem;
        border-radius: 3px;
        font-family: "Monaco", "Menlo", "Consolas", monospace;
        font-size: 0.875em;
        color: #7c3aed;
      }

      #markdown-preview pre {
        background: #0d1117;
        border: 1px solid #1e2738;
        border-radius: 6px;
        padding: 1rem 1.25rem;
        overflow-x: auto;
        margin-bottom: 1rem;
      }

      #markdown-preview pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        color: #e2e8f0;
        font-size: 0.85em;
      }

      #markdown-preview blockquote {
        border-left: 4px solid #6366f1;
        padding-left: 1rem;
        margin: 1rem 0;
        color: #64748b;
        font-style: italic;
        background: #fafbff;
        padding: 0.6rem 0.6rem 0.6rem 1rem;
        border-radius: 0 4px 4px 0;
      }

      #markdown-preview table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 1rem;
        font-size: 0.9em;
      }

      #markdown-preview th,
      #markdown-preview td {
        border: 1px solid #e2e8f0;
        padding: 0.5rem 0.75rem;
        text-align: left;
      }

      #markdown-preview th {
        background: #f8fafc;
        font-weight: 600;
        color: #475569;
      }

      #markdown-preview tr:nth-child(even) td { background: #fafbfc; }

      #markdown-preview ul,
      #markdown-preview ol {
        margin-bottom: 0.9rem;
        padding-left: 1.75rem;
      }

      #markdown-preview li { margin-bottom: 0.3rem; }

      #markdown-preview img { max-width: 100%; border-radius: 4px; }

      #markdown-preview hr {
        border: none;
        border-top: 2px solid #e2e8f0;
        margin: 1.5rem 0;
      }

      /* ── Buttons ──────────────────────────────────────── */
      .btn {
        padding: 0.4rem 0.85rem;
        border: none;
        border-radius: 5px;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        white-space: nowrap;
      }

      .btn-primary {
        background: #6366f1;
        color: white;
      }
      .btn-primary:hover { background: #4f46e5; }

      .btn-secondary {
        background: #e2e8f0;
        color: #475569;
      }
      .btn-secondary:hover { background: #cbd5e1; }

      .btn-outline {
        background: transparent;
        color: #6366f1;
        border: 1px solid #6366f1;
      }
      .btn-outline:hover { background: #6366f1; color: white; }

      .btn.success {
        background: #22c55e !important;
        color: white !important;
        border-color: #22c55e !important;
      }

      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .button-group {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
      }

      /* ── Tabs ─────────────────────────────────────────── */
      .tabs {
        display: flex;
        border-bottom: 1px solid #e8ecf0;
        background: #f8fafc;
        flex-shrink: 0;
      }

      .tab {
        padding: 0.55rem 1rem;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 500;
        color: #94a3b8;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
      }

      .tab:hover { color: #475569; background: rgba(99, 102, 241, 0.04); }

      .tab.active {
        color: #6366f1;
        border-bottom-color: #6366f1;
        background: white;
      }

      .tab-content {
        display: none;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      .tab-content.active {
        display: flex;
        flex-direction: column;
      }

      /* ── Divider between panels ───────────────────────── */
      .panel-divider {
        width: 1px;
        background: #d8dce6;
        flex-shrink: 0;
      }

      /* ── Responsive ───────────────────────────────────── */
      @media (max-width: 768px) {
        body { overflow: auto; }
        .main-container { flex-direction: column; gap: 1px; }
        .panel { min-height: 40vh; }
        .header { flex-wrap: wrap; gap: 0.4rem; }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <h1>Web to Markdown</h1>
        <p>Paste rich content on the left — get clean Markdown on the right</p>
      </div>
      <span class="header-badge">GFM + Tables + Code</span>
    </header>

    <main class="main-container">
      <!-- Left Panel: WYSIWYG Editor -->
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Rich Text Input</div>
            <div class="panel-hint">Paste or type — HTML is converted automatically</div>
          </div>
          <div class="button-group">
            <button id="clear-all" class="btn btn-secondary">✕ Clear</button>
          </div>
        </div>
        <div class="panel-content">
          <div
            id="editor"
            data-placeholder="Paste web content here (Ctrl+V / Cmd+V). Tables, headings, lists, code and links are all supported."
          ></div>
        </div>
      </div>

      <!-- Right Panel: Markdown Editor + Preview with Tabs -->
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Markdown Output</div>
            <div class="panel-hint">Edit directly or switch to Preview</div>
          </div>
          <div class="button-group">
            <button id="copy-md" class="btn btn-primary">📋 Copy</button>
            <button id="download-md" class="btn btn-outline">↓ Download</button>
          </div>
        </div>
        <div class="panel-content">
          <div class="tabs">
            <button class="tab active" data-tab="editor">Editor</button>
            <button class="tab" data-tab="preview">Preview</button>
          </div>

          <div class="tab-content active" id="editor-tab">
            <div id="markdown-editor"></div>
            <div id="md-stats" class="stats-bar">0 words · 0 chars · 0 lines</div>
          </div>

          <div class="tab-content" id="preview-tab">
            <div class="preview-container">
              <div id="markdown-preview">
                <p style="color:#94a3b8;text-align:center;margin-top:3rem;font-size:0.9rem">
                  Preview will appear here once you add content…
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
